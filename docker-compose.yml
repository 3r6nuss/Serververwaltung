# 24fire Server-Verwaltung – Produktions-Setup
#
# Start:   docker compose up -d --build
# Update:  git pull && docker compose up -d --build
# Logs:    docker compose logs -f app
#
# Werte kommen aus der .env-Datei (siehe .env.example).

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3001
    expose:
      - "3001"
    volumes:
      - dashboard_logs:/app/server/logs

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  dashboard_logs:
  caddy_data:
  caddy_config:
